<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nvim-browser smoke</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, sans-serif;
      background: #111318;
      color: #f4f6fb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(#2f3748 1px, transparent 1px),
        linear-gradient(90deg, #2f3748 1px, transparent 1px),
        #111318;
      background-size: 40px 40px;
    }
    main {
      width: min(720px, calc(100vw - 48px));
      border: 1px solid #7dd3fc;
      background: #172033;
      padding: 28px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0;
      color: #cbd5e1;
    }
    form {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }
    label {
      color: #bfdbfe;
      font-weight: 700;
    }
    input,
    button {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #7dd3fc;
      background: #0f172a;
      color: #f8fafc;
      font: inherit;
      padding: 10px 12px;
    }
    input:focus,
    button:focus {
      outline: 3px solid #facc15;
      outline-offset: 2px;
    }
    button {
      cursor: pointer;
      background: #0e7490;
      font-weight: 700;
    }
    output {
      min-height: 24px;
      color: #86efac;
      font-weight: 700;
    }
    strong {
      color: #86efac;
    }
  </style>
</head>
<body>
  <main>
    <h1>nvim-browser smoke</h1>
    <p><strong>ready</strong> deterministic local browser runtime fixture</p>
    <form id="nvim-browser-smoke-form">
      <label for="nvim-browser-smoke-input">Smoke input</label>
      <input id="nvim-browser-smoke-input" name="smoke" autocomplete="off">
      <button id="nvim-browser-smoke-submit" type="submit">Run smoke</button>
      <output id="nvim-browser-smoke-result" for="nvim-browser-smoke-input">waiting</output>
    </form>
  </main>
  <script>
    const form = document.querySelector("#nvim-browser-smoke-form");
    const input = document.querySelector("#nvim-browser-smoke-input");
    const result = document.querySelector("#nvim-browser-smoke-result");

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      result.value = "submitted: " + input.value;
      document.title = "nvim-browser smoke submitted: " + input.value;
      document.body.dataset.smokeSubmitted = input.value;
    });

    input.addEventListener("input", () => {
      if (input.value === "nvim-browser interaction") {
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
