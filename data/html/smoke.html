<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nvim-browser smoke</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, sans-serif;
      background: #111318;
      color: #f4f6fb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(#2f3748 1px, transparent 1px),
        linear-gradient(90deg, #2f3748 1px, transparent 1px),
        #111318;
      background-size: 40px 40px;
    }
    main {
      width: min(720px, calc(100vw - 48px));
      border: 1px solid #7dd3fc;
      background: #172033;
      padding: 28px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0;
      color: #cbd5e1;
    }
    strong {
      color: #86efac;
    }
  </style>
</head>
<body>
  <main>
    <h1>nvim-browser smoke</h1>
    <p><strong>ready</strong> deterministic local browser runtime fixture</p>
  </main>
</body>
</html>
