<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nvim-browser calibration</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, sans-serif;
      background: #111318;
      color: #f4f6fb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(#2d3340 1px, transparent 1px),
        linear-gradient(90deg, #2d3340 1px, transparent 1px),
        #111318;
      background-size: 40px 40px;
    }
    .marker {
      position: fixed;
      width: 18px;
      height: 18px;
      border: 2px solid #8bd5ff;
    }
    .top-left { left: 0; top: 0; border-right: 0; border-bottom: 0; }
    .top-right { right: 0; top: 0; border-left: 0; border-bottom: 0; }
    .bottom-left { left: 0; bottom: 0; border-right: 0; border-top: 0; }
    .bottom-right { right: 0; bottom: 0; border-left: 0; border-top: 0; }
    main {
      min-height: 100vh;
      text-align: center;
    }
    .intro {
      position: fixed;
      left: 0;
      right: 0;
      top: 70px;
    }
    h1 { margin: 0; font-size: 28px; }
    p { margin: 0; color: #b7c0d8; }
    button, input {
      font: inherit;
      color: #f4f6fb;
      background: #263247;
      border: 1px solid #8bd5ff;
      padding: 8px 12px;
    }
    #target {
      position: fixed;
      left: 340px;
      top: 210px;
      width: 120px;
      height: 60px;
    }
    #input {
      position: fixed;
      left: 300px;
      top: 294px;
      width: 200px;
    }
    #wheel {
      position: fixed;
      left: 520px;
      top: 210px;
      width: 120px;
      height: 70px;
      overflow: auto;
    }
    #wheel-spacer {
      height: 140px;
    }
    #status {
      position: fixed;
      left: 24px;
      bottom: 24px;
      text-align: left;
      white-space: pre-line;
      color: #d9e2ff;
    }
  </style>
</head>
<body>
  <div class="marker top-left"></div>
  <div class="marker top-right"></div>
  <div class="marker bottom-left"></div>
  <div class="marker bottom-right"></div>
  <main>
    <div class="intro">
      <h1>nvim-browser calibration</h1>
      <p>Click, hover, type, right-click, and wheel on the fixed targets, then run :NBrowserDoctor.</p>
    </div>
    <button id="target">Calibration target</button>
    <input id="input" aria-label="Calibration input" value="">
    <div id="wheel" role="button" tabindex="0" aria-label="Calibration wheel target">
      Wheel target
      <div id="wheel-spacer"></div>
    </div>
    <output id="status"></output>
  </main>
  <script>
    const state = {
      click: "pending",
      rightClick: "pending",
      hover: "pending",
      type: "pending",
      wheel: "pending",
    };
    const status = document.getElementById("status");
    const render = () => {
      status.textContent = [
        `calibration-click: ${state.click}`,
        `calibration-right-click: ${state.rightClick}`,
        `calibration-hover: ${state.hover}`,
        `calibration-type: ${state.type}`,
        `calibration-wheel: ${state.wheel}`,
      ].join("\n");
    };
    const target = document.getElementById("target");
    target.addEventListener("click", () => {
      state.click = "observed";
      render();
    });
    target.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      state.rightClick = "observed";
      render();
    });
    target.addEventListener("mouseenter", () => {
      state.hover = "observed";
      render();
    });
    document.getElementById("input").addEventListener("input", (event) => {
      state.type = event.target.value || "pending";
      render();
    });
    document.getElementById("wheel").addEventListener("scroll", () => {
      state.wheel = "observed";
      render();
    });
    render();
  </script>
</body>
</html>
